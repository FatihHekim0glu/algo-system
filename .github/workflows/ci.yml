name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install project (lean extras only — NO torch/onnx/onnxruntime/sklearn)
        # This is a TORCH-FREE integration capstone: only the lean [data,viz,dev]
        # extras are installed (numpy/pandas/scipy/statsmodels + plotly + the
        # lint/type/test stack). There is no [all] aggregate and no heavy ML serving
        # dependency; the whole pipeline runs torch-free.
        run: uv pip install --system -e ".[data,viz,dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Type-check (mypy strict)
        # Non-blocking while residual strict-mode issues are burned down; surfaced
        # in the log without failing the whole pipeline.
        continue-on-error: true
        run: mypy src

      - name: Test (pytest + coverage gate)
        run: pytest -q -m "not slow" --cov=algosystem --cov-report=term --cov-fail-under=85
